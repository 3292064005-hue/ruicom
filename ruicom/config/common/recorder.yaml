mission_state_topic: recon/mission_state
mission_state_typed_topic: recon/mission_state_typed
zone_capture_topic: recon/zone_capture_result
zone_capture_typed_topic: recon/zone_capture_result_typed
zone_capture_dynamic_topic: recon/zone_capture_result_dynamic
frame_region_counts_topic: recon/zone_counts
frame_region_counts_typed_topic: recon/zone_counts_typed
current_zone_topic: recon/current_zone
health_topic: recon/health
health_typed_topic: recon/health_typed
summary_snapshot_topic: recon/summary_snapshot
summary_snapshot_dynamic_topic: recon/summary_snapshot_v2
output_root: ~/.ros/ruikang_recon
output_root_use_namespace: true
writer_queue_size: 512
writer_rotate_max_bytes: 5242880
writer_rotate_keep: 3
snapshot_flush_hz: 1.0
snapshot_flush_on_state_change_only: false
recorder_authoritative_input: auto
terminal_finalize_policy: quiesced
terminal_quiesce_sec: 0.5
allow_final_rewrite_after_finalize: false
classes:
- friendly
- enemy
- hostage
class_schema_mismatch_policy: error
profile_role: integration
time_source_mode: ros
lifecycle_managed: false
official_report_mode: artifact
official_report_schema: ruikang.recon.official_report
official_report_version: 1.1.0
official_report_sink_path: ''
official_report_contract_path: ''
official_report_submission_id: ''
acceptance_stage: contract_smoke
runtime_grade: integration
