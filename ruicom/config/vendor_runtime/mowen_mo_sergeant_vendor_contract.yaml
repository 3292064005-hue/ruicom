contract_id: mowen_mo_sergeant_vendor_runtime_v2
contract_version: 2
platform_adapter_type: mowen_mo_sergeant
vendor_runtime_mode: isolated_legacy_workspace
vendor_workspace_ros_distro: melodic
vendor_workspace_python_major: 2
vendor_workspace_name: newznzc_ws
managed_entrypoints:
  repo_sidecar_launch: launch/mowen_vendor_sidecar.launch
  repo_sidecar_wrapper: tools/run_mowen_vendor_sidecar.sh
  repo_vendor_feedback_adapter: scripts/vendor_feedback_node.py
vendor_entrypoints:
  chassis_bridge: car_bringup/scripts/newt.py
  navigation_launch: nav_demo/launch/nav777.launch
  camera_launch: OrbbecSDK_ROS/dabai_dcw2.launch
  lidar_launch: lslidar_driver/launch/lslidar_serial.launch
  imu_launch: wit_ros_imu/launch/wit_imu.launch
mission_required_bindings:
  move_base_action_name:
    resource: action
    expected_type: move_base_msgs/MoveBaseAction
    vendor_resource: move_base
    normalized_resource: recon navigation action entry
    vendor_entrypoint: nav_demo/launch/nav777.launch
    notes: move_base action server exposed by the vendor navigation stack.
  odom_topic:
    resource: topic
    expected_type: nav_msgs/Odometry
    vendor_resource: odom
    normalized_resource: odom
    vendor_entrypoint: nav_demo/launch/nav777.launch
    notes: authoritative localization heartbeat consumed by mission arrival evaluation.
  amcl_pose_topic:
    resource: topic
    expected_type: geometry_msgs/PoseWithCovarianceStamped
    vendor_resource: amcl_pose
    normalized_resource: amcl_pose
    vendor_entrypoint: nav_demo/launch/nav777.launch
    notes: AMCL pose published by the vendor navigation runtime.
vision_required_bindings:
  camera_topic:
    resource: topic
    expected_type: sensor_msgs/Image
    vendor_resource: camera/rgb/image_raw
    normalized_resource: camera/rgb/image_raw
    vendor_entrypoint: OrbbecSDK_ROS/dabai_dcw2.launch
    notes: RGB camera stream consumed by the vision node.
bridge_required_bindings:
  upstream_feedback_topic:
    resource: topic
    expected_type: std_msgs/Bool
    vendor_resource: recon/platform/vendor/base_feedback_raw
    normalized_resource: recon/platform/vendor/base_feedback_raw
    bridge_output: recon/platform/base_feedback
    vendor_entrypoint: car_bringup/scripts/newt.py
    notes: explicit execution heartbeat entering the platform bridge.
  upstream_odom_topic:
    resource: topic
    expected_type: nav_msgs/Odometry
    vendor_resource: odom
    normalized_resource: odom
    bridge_output: recon/platform/base_feedback (observability only)
    vendor_entrypoint: nav_demo/launch/nav777.launch
    notes: odom is consumed by the bridge for observability and optional fallback policy validation.
  upstream_navigation_status_topic:
    resource: topic
    expected_type: actionlib_msgs/GoalStatusArray
    vendor_resource: move_base/status
    normalized_resource: move_base/status
    bridge_output: recon/navigation_status
    vendor_entrypoint: nav_demo/launch/nav777.launch
    notes: action status mirrored by the platform bridge into the unified recon topic.
  upstream_command_topic:
    resource: topic
    expected_type: geometry_msgs/Twist
    vendor_resource: cmd_vel
    normalized_resource: recon/platform/vendor/cmd_vel
    bridge_output: cmd_vel_raw
    vendor_entrypoint: nav_demo/launch/nav777.launch
    notes: upstream command stream relayed through the bridge into the single safety ingress.
