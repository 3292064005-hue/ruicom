name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml
      - name: Validate profile contracts
        run: python tools/validate_profile_contracts.py
      - name: Validate static Python contracts
        run: python tools/validate_static_python_contracts.py
      - name: Validate third-party governance
        run: python tools/validate_third_party_governance.py
      - name: Run Python unit tests
        run: PYTHONPATH=src pytest -q tests/test_*.py
