DWAPlannerROS:
  acc_lim_x: 0.5
  acc_lim_y: 0.5
  acc_lim_th: 2.0
  max_vel_x: 0.25
  min_vel_x: -0.25
  max_vel_y: 0.20
  min_vel_y: -0.20
  max_rot_vel: 0.8
  min_rot_vel: 0.25
  yaw_goal_tolerance: 0.10
  xy_goal_tolerance: 0.05
  latch_xy_goal_tolerance: false
  sim_time: 1.6
  sim_granularity: 0.025
  vx_samples: 20
  vy_samples: 20
  vth_samples: 30
  path_distance_bias: 64.0
  goal_distance_bias: 20.0
  occdist_scale: 0.2
  forward_point_distance: 0.25
  stop_time_buffer: 0.2
  scaling_speed: 0.2
  max_scaling_factor: 0.2
  publish_cost_grid: false
  oscillation_reset_dist: 0.05
  prune_plan: true
  holonomic_robot: true
