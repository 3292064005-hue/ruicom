camera_topic: "/camera/color/image_raw"
overlay_topic: "/recon/overlay/image_raw"
detections_topic: "/recon/detections"
detections_json_topic: "/recon/detections_json"
frame_region_counts_topic: "/recon/zone_counts"
health_topic: "/recon/health"
output_root: "~/.ros/ruikang_recon"
detector_type: "color_blob"
onnx_model_path: ""
model_manifest_path: ""
parser_type: "yolo_v5_like"
input_size: 640
confidence_threshold: 0.35
score_threshold: 0.25
nms_threshold: 0.45
min_area_px: 180
max_area_px: 80000
save_interval_sec: 2.0
stable_window: 5
publish_debug_image: true
save_artifacts: true
strict_backend: true
frame_region_adapter_type: "none"
classes: ["friendly", "enemy", "hostage"]
writer_queue_size: 512
writer_rotate_max_bytes: 5242880
writer_rotate_keep: 3
named_regions: []
color_blob:
  red_1:   {lower: [0, 80, 60],   upper: [10, 255, 255]}
  red_2:   {lower: [170, 80, 60], upper: [179, 255, 255]}
  blue:    {lower: [95, 80, 50],  upper: [135, 255, 255]}
  black:   {lower: [0, 0, 0],     upper: [179, 255, 60]}
  morph_kernel: 5
  min_aspect_ratio: 0.20
  max_aspect_ratio: 1.80
  min_fill_ratio: 0.18
